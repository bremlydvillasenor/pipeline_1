[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Logging: show log output in test runs
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s  %(levelname)-8s  %(name)s  %(message)s
log_date_format = %H:%M:%S

# Markers
markers =
    unit: Pure unit tests (no file I/O)
    integration: Tests that create/read actual files
    dq: Data quality validation tests

# Warnings
filterwarnings =
    ignore::UserWarning:openpyxl
    ignore::DeprecationWarning
